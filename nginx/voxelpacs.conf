# =============================================================================
# VOXEL PACS — nginx/voxelpacs.conf
# VirtualHost Nginx — gerado automaticamente por scripts/install.sh
# NUNCA edite manualmente — será regenerado pelo install.sh
#
# Rotas:
#   /             → OHIF Viewer (container Docker 127.0.0.1:3000)
#   /dicom-web/   → Orthanc DICOMweb (container Docker — proxy com auth)
#   /wado         → Orthanc WADO-URI (container Docker — proxy com auth)
#   /api/         → API VOXEL PACS (container Docker 127.0.0.1:8080)
#   /open/{token} → API VOXEL PACS (resolve token → redireciona para OHIF)
#   /health       → Health check Nginx
#   /ready        → Verifica se todos os serviços estão prontos
#   /live         → Liveness probe (Nginx está vivo)
# =============================================================================

server {
    listen 80;
    server_name DOMAIN_PLACEHOLDER;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name DOMAIN_PLACEHOLDER;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── DICOMweb → Orthanc ───────────────────────────────────────────────────
    location /dicom-web/ {
        proxy_pass         http://127.0.0.1:8042/dicom-web/;
        proxy_set_header   Authorization "Basic ORTHANC_B64_PLACEHOLDER";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_buffering    off;
        add_header Access-Control-Allow-Origin  "https://view.voxelpacs.com.br" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── WADO-URI → Orthanc ───────────────────────────────────────────────────
    location /wado {
        proxy_pass         http://127.0.0.1:8042/wado;
        proxy_set_header   Authorization "Basic ORTHANC_B64_PLACEHOLDER";
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;
    }

    # ── API VOXEL PACS ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Rota /open/{token} → API VOXEL PACS ─────────────────────────────────
    # A API resolve o token → retorna StudyInstanceUID → redireciona para OHIF
    # Fluxo: ERP → Token → API → StudyUID → OHIF
    location ~ ^/open/(.+)$ {
        proxy_pass         http://127.0.0.1:8080/api/open/$1;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── OHIF Viewer (SPA) ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # ── Monitoramento ────────────────────────────────────────────────────────
    location /health {
        return 200 '{"status":"ok","service":"nginx"}';
        add_header Content-Type application/json;
    }

    location /live {
        return 200 '{"status":"alive"}';
        add_header Content-Type application/json;
    }

    location /ready {
        proxy_pass         http://127.0.0.1:8080/api/ready;
        proxy_read_timeout 5s;
    }
}

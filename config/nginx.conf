# =============================================================================
# VOXEL PACS — config/nginx.conf
#
# ⚠️  ATENÇÃO: Este arquivo é APENAS DOCUMENTAÇÃO DE REFERÊNCIA.
#
# O install.sh NÃO sobrescreve o /etc/nginx/nginx.conf do Ubuntu.
# O nginx.conf padrão do Ubuntu já contém os includes necessários:
#   include /etc/nginx/conf.d/*.conf;
#   include /etc/nginx/sites-enabled/*;
#
# O VirtualHost do VOXEL PACS é criado em:
#   /etc/nginx/sites-available/voxelpacs.conf
#
# E ativado via symlink:
#   ln -sf /etc/nginx/sites-available/voxelpacs.conf \
#          /etc/nginx/sites-enabled/voxelpacs.conf
#
# Nunca coloque blocos server {} dentro do nginx.conf.
# =============================================================================
#
# Configuração padrão do Ubuntu (nginx.conf) para referência:
#
# user www-data;
# worker_processes auto;
# pid /run/nginx.pid;
# include /etc/nginx/modules-enabled/*.conf;
#
# events {
#     worker_connections 768;
# }
#
# http {
#     sendfile on;
#     tcp_nopush on;
#     types_hash_max_size 2048;
#     include /etc/nginx/mime.types;
#     default_type application/octet-stream;
#     ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
#     ssl_prefer_server_ciphers on;
#     access_log /var/log/nginx/access.log;
#     error_log /var/log/nginx/error.log;
#     gzip on;
#     include /etc/nginx/conf.d/*.conf;
#     include /etc/nginx/sites-enabled/*;    ← OBRIGATÓRIO
# }

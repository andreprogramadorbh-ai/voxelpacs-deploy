# =============================================================================
# VOXEL PACS — VirtualHost Orthanc DICOM
# Domínio: dicom.voxelpacs.com.br → Orthanc (127.0.0.1:8042)
# =============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name dicom.voxelpacs.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Orthanc + DICOMweb
server {
    listen 443 ssl;
    server_name dicom.voxelpacs.com.br;

    ssl_certificate     /etc/letsencrypt/live/dicom.voxelpacs.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dicom.voxelpacs.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    # Logs
    access_log /opt/voxelpacs/logs/dicom-access.log;
    error_log  /opt/voxelpacs/logs/dicom-error.log;

    # ── DICOMweb (QIDO-RS / WADO-RS) ─────────────────────────────────────────
    location /dicom-web/ {
        proxy_pass         http://127.0.0.1:8042/dicom-web/;
        proxy_set_header   Authorization "Basic dml2ZXJlX2FkbWluOklubGF1ZG8yNTkwODdA";
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        client_max_body_size 2G;

        # CORS para OHIF
        add_header Access-Control-Allow-Origin  "https://view.voxelpacs.com.br" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── WADO-URI ──────────────────────────────────────────────────────────────
    location /wado {
        proxy_pass         http://127.0.0.1:8042/wado;
        proxy_set_header   Authorization "Basic dml2ZXJlX2FkbWluOklubGF1ZG8yNTkwODdA";
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # ── Orthanc REST API ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8042;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 2G;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

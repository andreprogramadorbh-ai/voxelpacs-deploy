version: "3.8"

# =============================================================================
# VOXEL PACS — docker/docker-compose.yml
# Serviços: OHIF Viewer
# Nginx roda via systemd no host (com Certbot)
# Orthanc roda em servidor remoto — configurado via .env
# =============================================================================

networks:
  voxelpacs:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # OHIF Viewer
  # ---------------------------------------------------------------------------
  ohif:
    image: ohif/app:latest
    container_name: voxelpacs-ohif
    restart: always
    environment:
      - TZ=${TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ../config/ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
      - ../config/ohif/logo:/usr/share/nginx/html/assets/logo:ro
    networks:
      - voxelpacs
    ports:
      - "127.0.0.1:${OHIF_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

version: "3.8"

# =============================================================================
# VOXEL PACS — docker/docker-compose.yml
# Arquitetura: 4 containers + Nginx no host
#
#   Internet
#       │
#       ▼
#   nginx (host — não container)
#       │
#   ┌───┴──────────────────────┐
#   │                          │
#   ▼                          ▼
#  ohif                 voxelpacs-api (PHP 8.1)
#                              │
#                              ▼
#                           mysql
#                              │
#                              ▼
#                           orthanc
#                              │
#                              ▼
#                       storage/dicom
#
# SEGURANÇA:
#   - Portas 8042/4242 (Orthanc) NUNCA expostas externamente
#   - Portas 3000 (OHIF) e 8080 (API) apenas para 127.0.0.1
#   - MySQL apenas na rede interna Docker
#
# VERSÕES FIXAS:
#   - OHIF:    ohif/app:v3.12.5
#   - Orthanc: osimis/orthanc:24.11.3 (com plugins DICOMweb)
#   - MySQL:   mysql:8.0
#   - PHP/API: build local (./api/Dockerfile)
# =============================================================================

networks:
  voxelpacs:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  orthanc_storage:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # MySQL 8.0 — banco de dados da API VOXEL PACS
  # O sistema PHP usa MySQL (conforme .env.example do voxelpacs)
  # Armazena: dados da aplicação (exames, usuários, tenants, etc.)
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: voxelpacs-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-voxel_pacs}
      MYSQL_USER: ${DB_USERNAME:-voxelpacs_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Defina MYSQL_ROOT_PASSWORD no .env}
      TZ: ${TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ../postgres/data:/var/lib/mysql
      # Migrations executadas automaticamente na primeira inicialização
      - ../api/database/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - voxelpacs
    # MySQL NÃO expõe porta externamente — apenas rede interna Docker
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${DB_USERNAME:-voxelpacs_user}",
             "-p${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Orthanc — servidor DICOM + DICOMweb
  # Imagem: osimis/orthanc (inclui plugins DICOMweb)
  # Armazena: arquivos DICOM em storage/dicom
  # NUNCA exposto externamente — apenas via proxy Nginx (/dicom-web, /wado)
  # ---------------------------------------------------------------------------
  orthanc:
    image: osimis/orthanc:24.11.3
    container_name: voxelpacs-orthanc
    restart: always
    environment:
      TZ: ${TIMEZONE:-America/Sao_Paulo}
    volumes:
      # Configurações modulares do Orthanc
      - ../orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ../orthanc/credentials.json:/etc/orthanc/credentials.json:ro
      - ../orthanc/dicomweb.json:/etc/orthanc/dicomweb.json:ro
      - ../orthanc/webviewer.json:/etc/orthanc/webviewer.json:ro
      - ../orthanc/worklists.json:/etc/orthanc/worklists.json:ro
      # Storage DICOM separado (facilita backup e migração)
      - ../storage/dicom:/var/lib/orthanc/db
    networks:
      - voxelpacs
    ports:
      # HTTP — apenas localhost (Nginx faz proxy de /dicom-web e /wado)
      - "127.0.0.1:8042:8042"
      # DICOM C-STORE — apenas localhost
      - "127.0.0.1:4242:4242"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8042/system"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # OHIF Viewer v3.12.5 — visualizador DICOM
  # Versão FIXA — não usar latest em produção
  # app-config.js usa formato OHIF v3 (dataSources)
  # Acesso: apenas via Nginx (127.0.0.1:3000)
  # ---------------------------------------------------------------------------
  ohif:
    image: ohif/app:v3.12.5
    container_name: voxelpacs-ohif
    restart: always
    environment:
      TZ: ${TIMEZONE:-America/Sao_Paulo}
    volumes:
      # app-config.js gerado por scripts/install-ohif.sh (formato OHIF v3)
      - ../ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
      # Logo VOXEL PACS
      - ../ohif/logo:/usr/share/nginx/html/assets/logo:ro
    networks:
      - voxelpacs
    ports:
      - "127.0.0.1:${OHIF_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # API VOXEL PACS — Sistema PHP 8.1 (build local)
  # Código-fonte: ../api/ (submódulo git → andreprogramadorbh-ai/voxelpacs)
  # Responsabilidades: auth, RBAC, tokens, auditoria, RIS, ERP, HL7
  # Fluxo de token: ERP → POST /open/{token} → API → StudyUID → OHIF
  # ---------------------------------------------------------------------------
  voxelpacs-api:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: voxelpacs-api:latest
    container_name: voxelpacs-api
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      orthanc:
        condition: service_healthy
    environment:
      TZ: ${TIMEZONE:-America/Sao_Paulo}
      # Aplicação
      APP_NAME: "${OHIF_NAME:-VOXEL PACS}"
      APP_ENV: ${APP_ENV:-production}
      APP_URL: "https://${DOMAIN}"
      APP_DEBUG: "false"
      APP_SECRET: ${APP_SECRET:?Defina APP_SECRET no .env}
      SESSION_TIMEOUT: "3600"
      # Banco de dados MySQL (rede interna Docker)
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-voxel_pacs}
      DB_USERNAME: ${DB_USERNAME:-voxelpacs_user}
      DB_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env}
      # Orthanc (rede interna Docker)
      ORTHANC_URL: http://orthanc:8042
      ORTHANC_USER: ${ORTHANC_USERNAME}
      ORTHANC_PASS: ${ORTHANC_PASSWORD}
      ORTHANC_AE_TITLE: ${ORTHANC_AET:-ORTHANCPACS}
      ORTHANC_DICOM_PORT: "4242"
      # OHIF Viewer
      DICOM_VIEWER_URL: "https://${DOMAIN}"
      # Storage
      STORAGE_PATH: /var/www/html/storage
      UPLOAD_MAX_SIZE: "50M"
      # E-mail
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@voxelpacs.com.br}
      MAIL_FROM_NAME: "VOXEL PACS"
    volumes:
      # Storage persistente (uploads, logs)
      - ../storage/uploads:/var/www/html/storage/uploads
    networks:
      - voxelpacs
    ports:
      # Expõe APENAS para localhost — Nginx faz o proxy reverso
      - "127.0.0.1:${API_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

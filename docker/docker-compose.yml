version: "3.8"

# =============================================================================
# VOXEL PACS — docker/docker-compose.yml
#
# Imagem:       ohif/app:v3.12.5  (versão FIXA — não usar latest em produção)
# Repositório:  https://hub.docker.com/r/ohif/app
# Docs:         https://docs.ohif.org/deployment/docker
#
# VERSÃO FIXA: Para atualizar o OHIF, altere a tag abaixo, atualize o
# app-config.js conforme a nova versão e teste antes de publicar.
# Nunca use `latest` em produção — cada atualização pode quebrar a config.
#
# ARQUITETURA:
#   - OHIF roda no container, exposto APENAS para 127.0.0.1:3000
#   - Nginx no host faz proxy reverso: https://view.voxelpacs.com.br → OHIF
#   - Orthanc fica em servidor remoto — Nginx faz proxy de /dicom-web e /wado
#   - O app-config.js usa URLs absolutas: https://view.voxelpacs.com.br/dicom-web
#
# PRÉ-REQUISITO:
#   Execute ANTES de subir:  bash scripts/install-ohif.sh
#   Isso gera: config/ohif/app-config.js (montado como volume abaixo)
#
# Para subir manualmente:
#   cd docker && docker compose up -d
# =============================================================================

networks:
  voxelpacs:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # OHIF Viewer v3.12.5
  # Imagem fixa: ohif/app:v3.12.5
  # app-config.js usa formato OHIF v3 (dataSources, não servers.dicomWeb)
  # ---------------------------------------------------------------------------
  ohif:
    image: ohif/app:v3.12.5
    container_name: voxelpacs-ohif
    restart: always
    environment:
      - TZ=${TIMEZONE:-America/Sao_Paulo}
    volumes:
      # app-config.js gerado por scripts/install-ohif.sh
      # Formato OHIF v3: dataSources (NÃO servers.dicomWeb da v2)
      - ../config/ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
      # Logo VOXEL PACS
      - ../config/ohif/logo:/usr/share/nginx/html/assets/logo:ro
    networks:
      - voxelpacs
    ports:
      # Expõe APENAS para localhost — Nginx faz o proxy reverso
      - "127.0.0.1:${OHIF_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

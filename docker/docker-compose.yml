version: "3.8"

# =============================================================================
# VOXEL PACS — docker/docker-compose.yml
#
# Imagem oficial: ohif/app:latest
# Repositório:    https://hub.docker.com/r/ohif/app
# Documentação:   https://docs.ohif.org/deployment/docker
# Versão estável: v3.12.5 (latest aponta sempre para a mais recente estável)
#
# ARQUITETURA:
#   - OHIF Viewer roda no container, exposto APENAS para 127.0.0.1
#   - Nginx no host faz proxy reverso: https://DOMAIN → http://127.0.0.1:3000
#   - Orthanc fica em servidor remoto — OHIF acessa via proxy Nginx (/dicom-web, /wado)
#   - NENHUM IP, porta ou domínio externo é configurado no app-config.js
#
# PRÉ-REQUISITO OBRIGATÓRIO:
#   Execute ANTES de subir este Compose:
#     bash scripts/install-ohif.sh
#   Isso gera: config/ohif/app-config.js (montado como volume abaixo)
#
# Para subir manualmente:
#   cd docker && docker compose up -d
# =============================================================================

networks:
  voxelpacs:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # OHIF Viewer
  # Imagem oficial: ohif/app:latest (https://hub.docker.com/r/ohif/app)
  #
  # O app-config.js é montado como volume somente leitura.
  # Ele aponta para /dicom-web e /wado (caminhos relativos via proxy Nginx).
  # Nenhum IP, porta ou domínio externo é configurado no app-config.js.
  # ---------------------------------------------------------------------------
  ohif:
    image: ohif/app:latest
    container_name: voxelpacs-ohif
    restart: always
    env_file:
      - ../.env
    environment:
      - TZ=${TIMEZONE:-America/Sao_Paulo}
    volumes:
      # app-config.js gerado por scripts/install-ohif.sh
      # Montado sobre o arquivo padrão da imagem
      - ../config/ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
      # Logo customizado
      - ../config/ohif/logo:/usr/share/nginx/html/assets/logo:ro
    networks:
      - voxelpacs
    ports:
      # Expõe APENAS para localhost — Nginx faz o proxy reverso
      # Nunca expor diretamente para 0.0.0.0
      - "127.0.0.1:${OHIF_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

version: "3.8"

# =============================================================================
# VOXEL PACS — docker-compose.yml
# Serviços: OHIF Viewer + Nginx
# O Orthanc roda em servidor remoto — configurado via .env
# =============================================================================

networks:
  voxelpacs:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # OHIF Viewer
  # ---------------------------------------------------------------------------
  ohif:
    image: ohif/app:latest
    container_name: voxelpacs-ohif
    restart: always
    environment:
      - TZ=${TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ./config/ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
      - ./config/ohif/logo:/usr/share/nginx/html/assets/logo:ro
    networks:
      - voxelpacs
    expose:
      - "${OHIF_PORT:-3000}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Nginx — Proxy Reverso + SSL
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: ./docker
      dockerfile: Dockerfile.nginx
    container_name: voxelpacs-nginx
    restart: always
    environment:
      - TZ=${TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ./config/nginx/sites:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    ports:
      - "${NGINX_PORT:-80}:80"
      - "443:443"
    depends_on:
      ohif:
        condition: service_healthy
    networks:
      - voxelpacs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

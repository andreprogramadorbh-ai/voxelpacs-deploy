version: '3.8'

services:
  ohif:
    image: ohif/app:latest
    container_name: voxelpacs-ohif
    restart: always
    environment:
      - APP_CONFIG=/usr/share/nginx/html/app-config.js
    volumes:
      - ./config/ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
      - ./config/ohif/logo:/usr/share/nginx/html/assets/logo:ro
    networks:
      - voxelpacs-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build:
      context: ./docker
      dockerfile: Dockerfile.nginx
    container_name: voxelpacs-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - ohif
    networks:
      - voxelpacs-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

networks:
  voxelpacs-net:
    driver: bridge

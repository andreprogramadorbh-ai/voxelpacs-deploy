name: VOXEL PACS — Deploy Automático

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy para Produção
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Validar arquivos essenciais
        run: |
          echo "Verificando arquivos essenciais..."
          test -f docker-compose.yml && echo "✅ docker-compose.yml encontrado" || (echo "❌ docker-compose.yml não encontrado" && exit 1)
          test -f install.sh && echo "✅ install.sh encontrado" || (echo "❌ install.sh não encontrado" && exit 1)
          test -f .env.example && echo "✅ .env.example encontrado" || (echo "❌ .env.example não encontrado" && exit 1)
          test -f config/nginx/default.conf && echo "✅ config/nginx/default.conf encontrado" || (echo "❌ config/nginx/default.conf não encontrado" && exit 1)
          test -f config/ohif/app-config.js && echo "✅ config/ohif/app-config.js encontrado" || (echo "❌ config/ohif/app-config.js não encontrado" && exit 1)
          echo "Todos os arquivos essenciais estão presentes."

      - name: Validar sintaxe do docker-compose.yml
        run: |
          docker compose config -q && echo "✅ docker-compose.yml é válido" || (echo "❌ docker-compose.yml inválido" && exit 1)

      - name: Deploy via SSH para o servidor de produção
        uses: appleboy/ssh-action@v1.0.3
        # Este step só é executado se os secrets SSH estiverem configurados no repositório.
        # Vá em: Settings > Secrets and variables > Actions > New repository secret
        # Adicione: SSH_HOST, SSH_USERNAME, SSH_PRIVATE_KEY
        if: ${{ secrets.SSH_HOST != '' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "--- Iniciando deploy no servidor de produção ---"
            cd /opt/voxelpacs-deploy
            git pull origin main
            ./update.sh
            echo "--- Deploy concluído ---"

      - name: Notificar sucesso
        if: success()
        run: echo "✅ Pipeline de deploy concluído com sucesso!"

      - name: Notificar falha
        if: failure()
        run: echo "❌ Pipeline de deploy falhou. Verifique os logs acima."

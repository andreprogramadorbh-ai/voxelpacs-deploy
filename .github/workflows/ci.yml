name: VOXEL PACS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Validate YAML files
        run: |
          sudo apt-get install -y yamllint
          yamllint docker/docker-compose.yml .github/workflows/ci.yml

      - name: Validate Shell Scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh || true # Aviso apenas, não falha o build

      - name: Check Directory Structure
        run: |
          test -d docker
          test -d config
          test -d scripts
          test -d docs
          test -f scripts/install.sh
          test -f docker/docker-compose.yml
          echo "Estrutura validada com sucesso!"
